name: Mobile Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_4
          script: npm test

  ios-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: npm install -g appium

      - name: Install XCUITest driver
        run: appium driver install xcuitest

      - name: Install iOS dependencies
        run: brew install ios-deploy

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Boot iOS Simulator
        run: |
          # Pick the newest iPhone simulator available on macos-latest runners.
          devices=$(xcrun simctl list devices available)
          UDID=$(
            echo "$devices" | grep -E "iPhone 15( Pro Max| Pro| Plus)? \(" | head -n1 | awk -F'[()]' '{print $2}'
          )
          if [ -z "$UDID" ]; then
            UDID=$(
              echo "$devices" | grep -E "iPhone 14( Pro Max| Pro| Plus)? \(" | head -n1 | awk -F'[()]' '{print $2}'
            )
          fi
          if [ -z "$UDID" ]; then
            UDID=$(
              echo "$devices" | grep -E "iPhone [0-9]+[A-Za-z ]* \(" | head -n1 | awk -F'[()]' '{print $2}'
            )
          fi
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true

      - name: Run iOS smoke test
        run: npx wdio run config/wdio.ios.conf.ts
        continue-on-error: true
